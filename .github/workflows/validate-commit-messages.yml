name: Validate PR Title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-pr-title:
    name: Validate PR Title
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title matches release pattern
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Matches the headerPattern in .releaserc.json:
          # ^(?:[A-Za-z]{2,4}-\d{1,5}:\s+)?\[?(\w+)(?:\([^)]+\))?\]?(?::\s+|\s+)(.+)$
          #
          # Valid examples:
          #   feat: add new feature
          #   feat(scope): add new feature
          #   [minor] add new feature
          #   [minor](scope) add new feature
          #   SF-5310: [minor] add constant for pairing hearing aids
          #   SF-5310: feat(scope): add new feature
          PATTERN='^([A-Za-z]{2,4}-[0-9]{1,5}:[[:space:]]+)?(\[?[a-zA-Z0-9_]+(\([^)]+\))?\]?)(:[[:space:]]+|[[:space:]]+).+'

          echo "PR title: $PR_TITLE"

          if echo "$PR_TITLE" | grep -qE "$PATTERN"; then
            echo "✅ PR title is valid"
          else
            echo "❌ PR title does not match the required format."
            echo ""
            echo "Expected format (matching .releaserc.json headerPattern):"
            echo "  [Jira ticket: ] <type>[(<scope>)][: | ] <subject>"
            echo ""
            echo "Valid examples:"
            echo "  feat: add new feature"
            echo "  fix(auth): resolve login issue"
            echo "  [minor] improve performance"
            echo "  SF-5310: [minor] add constant for pairing hearing aids"
            echo "  SF-5310: feat(scope): add new feature"
            exit 1
          fi



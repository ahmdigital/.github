name: Validate PR Title

on:
  pull_request:
    types: [opened, edited, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-pr-title:
    name: Validate PR Title
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title matches release pattern
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Valid types are taken explicitly from releaseRules in .releaserc.json.
          # Type must EITHER be wrapped in brackets [type] OR followed by a colon type:
          # Conventional commit breaking marker is allowed: type!: or type(scope)!:
          # Optionally preceded by a Jira ticket prefix (e.g. SF-5310: )
          TYPES='minor|major|patch|feat|fix|perf|refactor|revert|build|chore|docs|style|test|ci'
          PATTERN="^([A-Za-z]{2,4}-[0-9]{1,5}:[[:space:]]+)?(\[($TYPES)\](\([^)]+\))?[[:space:]]+|($TYPES)(\([^)]+\))?!?:[[:space:]]+).+"

          echo "PR title: $PR_TITLE"

          if echo "$PR_TITLE" | grep -qE "$PATTERN"; then
            echo "✅ PR title is valid"
          else
            echo "❌ PR title does not match the required format."
            echo ""
            echo "Expected format (matching .releaserc.json headerPattern):"
            echo "  [Jira ticket: ] <type>[(<scope>)][: | ] <subject>"
            echo ""
            echo "Valid examples:"
            echo "  feat: add new feature"
            echo "  feat!: introduce breaking API change"
            echo "  feat(auth)!: add new auth feature with breaking change"
            echo "  fix(auth): resolve login issue"
            echo "  [minor] improve performance"
            echo "  SF-5310: [minor] add constant for pairing hearing aids"
            echo "  SF-5310: feat(scope): add new feature"
            exit 1
          fi

name: PR Jira Autolink

on:
  pull_request:
    types: [opened]
  workflow_call:
  merge_group:

permissions:
  pull-requests: write

jobs:
  autolink:
    name: Add Jira Link to PR Title and Description
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' && github.event.action == 'opened' }}

    steps:
      - uses: tzkhan/pr-update-action@v2
        name: Update PR Title with Jira Issue
        if: ${{ !contains(github.event.pull_request.title, '([A-Za-z]{2,4}-\\d{1,5})') }}
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          head-branch-regex: '([A-Za-z]{2,4})-(\d{1,5})'
          title-template: "%headbranch%: "
          title-update-action: "prefix"
      
      - uses: tzkhan/pr-update-action@v2
        name: Add Jira Issue to PR Body
        if: ${{ !contains(github.event.pull_request.body, 'Jira issue:') }}
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          head-branch-regex: '([A-Za-z]{2,4})-(\d{1,5})'
          body-template: |
            Jira issue: [%headbranch%](https://medibank.atlassian.net/browse/%headbranch%)
            ---
          body-update-action: "prefix"

  forceSuccess:
    name: Force Success
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'merge_group' }}
    steps:
      - name: Force Success
        run: exit 0
